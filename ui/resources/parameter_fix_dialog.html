<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参数修正</title>
    <style>
        /* 参数修正对话框样式 */
        .parameter-fix-dialog {
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        
        .parameter-fix-dialog h3 {
            color: #FF9800;
            margin-top: 0;
            margin-bottom: 15px;
        }
        
        .message {
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        #parameter-form {
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group label .required {
            color: #F44336;
        }
        
        .form-group label .description {
            font-weight: normal;
            font-size: 12px;
            color: #757575;
            margin-left: 5px;
        }
        
        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .form-group input[type="checkbox"] {
            margin-right: 8px;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #confirm-btn {
            background-color: #4CAF50;
            color: white;
            border: 2px solid #388E3C;
        }
        
        #confirm-btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }
        
        #reset-btn {
            background-color: #FF9800;
            color: white;
            border: 2px solid #F57C00;
        }
        
        #reset-btn:hover {
            background-color: #f57c00;
            transform: translateY(-2px);
        }
        
        #cancel-btn {
            background-color: #F44336;
            color: white;
            border: 2px solid #D32F2F;
        }
        
        #cancel-btn:hover {
            background-color: #d32f2f;
            transform: translateY(-2px);
        }
        
        /* 响应式设计 */
        @media (max-width: 480px) {
            .buttons {
                flex-direction: column;
            }
            
            .buttons button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="parameter-fix-dialog">
        <h3>⚠️ 参数修正</h3>
        <div class="message"></div>
        <form id="parameter-form">
            <!-- 动态生成的表单字段将插入这里 -->
        </form>
        <div class="buttons">
            <button id="confirm-btn" onclick="sendResponse({action: 'accept', content: collectFormData()});">✅ 确认</button>
            <button id="reset-btn" onclick="resetForm();">🔄 重置</button>
            <button id="cancel-btn" onclick="sendResponse({action: 'decline'});">❌ 取消</button>
        </div>
    </div>
    <script>
        // 全局变量
        let originalParams = {};
        let currentSchema = {};
        
        // 初始化函数
        function initParameterFixDialog(message, schema) {
            // 保存参数信息
            currentSchema = schema;
            originalParams = parseSchema(schema);
            
            // 更新消息
            document.querySelector('.message').textContent = message;
            
            // 生成表单
            generateForm(originalParams);
        }
        
        // 解析schema
        function parseSchema(schema) {
            const params = {};
            
            if (typeof schema === 'object' && schema !== null) {
                if (schema.properties) {
                    // OpenAPI风格
                    for (const [paramName, paramInfo] of Object.entries(schema.properties)) {
                        params[paramName] = {
                            type: paramInfo.type || 'string',
                            description: paramInfo.description || '',
                            default: paramInfo.default || '',
                            required: schema.required && schema.required.includes(paramName)
                        };
                    }
                } else {
                    // 直接键值对
                    for (const [paramName, paramValue] of Object.entries(schema)) {
                        params[paramName] = {
                            type: 'string',
                            description: '',
                            default: paramValue,
                            required: true
                        };
                    }
                }
            }
            
            return params;
        }
        
        // 生成表单
        function generateForm(params) {
            const form = document.getElementById('parameter-form');
            form.innerHTML = '';
            
            for (const [paramName, paramInfo] of Object.entries(params)) {
                const formGroup = document.createElement('div');
                formGroup.className = 'form-group';
                
                // 创建标签
                const label = document.createElement('label');
                label.textContent = paramName;
                
                if (paramInfo.required) {
                    const requiredSpan = document.createElement('span');
                    requiredSpan.className = 'required';
                    requiredSpan.textContent = ' *';
                    label.appendChild(requiredSpan);
                }
                
                if (paramInfo.description) {
                    const descSpan = document.createElement('span');
                    descSpan.className = 'description';
                    descSpan.textContent = `(${paramInfo.description})`;
                    label.appendChild(descSpan);
                }
                
                formGroup.appendChild(label);
                
                // 创建输入控件
                let input;
                if (paramInfo.type === 'boolean') {
                    input = document.createElement('input');
                    input.type = 'checkbox';
                    input.name = paramName;
                    input.checked = String(paramInfo.default).toLowerCase() === 'true';
                } else if (paramInfo.type === 'number' || paramInfo.type === 'integer') {
                    input = document.createElement('input');
                    input.type = 'number';
                    input.name = paramName;
                    input.value = paramInfo.default;
                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.name = paramName;
                    input.value = paramInfo.default;
                }
                
                formGroup.appendChild(input);
                form.appendChild(formGroup);
            }
        }
        
        // 收集表单数据
        function collectFormData() {
            const form = document.getElementById('parameter-form');
            const formData = {};
            
            const inputs = form.querySelectorAll('input');
            inputs.forEach(input => {
                if (input.type === 'checkbox') {
                    formData[input.name] = input.checked;
                } else {
                    formData[input.name] = input.value;
                }
            });
            
            return formData;
        }
        
        // 重置表单
        function resetForm() {
            generateForm(originalParams);
        }
        
        // 发送响应
        function sendResponse(response) {
            // 由于在QTextEdit中，我们使用链接点击来模拟响应
            // 创建一个临时链接并点击它
            const link = document.createElement('a');
            if (response.action === 'accept') {
                link.href = 'param:confirm';
            } else if (response.action === 'decline') {
                link.href = 'param:cancel';
            }
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
