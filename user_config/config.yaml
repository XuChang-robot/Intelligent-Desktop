# 系统配置

# MCP 配置
mcp:
  server:
    host: "localhost"
    port: 8001
    max_connections: 10
  client:
    retry_attempts: 3

# LLM 配置
llm:
  model: "qwen3:4b"
  base_url: "http://localhost:11434"
  temperature: 0
  max_tokens: 100000
  repeat_penalty: 1.1
  top_p: 0.9
  top_k: 40

# 安全配置
security:
  enable_sandbox: true
  dangerous_commands: ["rm -rf", "format", "shutdown", "reboot"]
  allow_network: true
  allow_file_system: true

# UI 配置
ui:
  title: "智能桌面系统"
  width: 800
  height: 600
  theme: "light"

# 日志配置
logging:
  dev_mode:
    enabled: true  # 开发模式总开关
    enable_thinking: false  # LLM思考输出开关（需要模型支持，仅在enabled=true时生效）
  log_dir: "logs"
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  visualization_dir: "logs/visualizations"

# 邮件服务配置
email:
  smtp:
    server: "smtp.163.com"
    port: 465
  imap:
    port: 993

# 缓存配置
cache:
  enabled: false  #总开关
  # 匹配策略开关
  enable_hash_match: true  # 哈希精确匹配开关
  enable_faiss_match: false  # FAISS语义匹配开关
  cache_dir: "cache"

  # Embedding模型
  embedding_model: "nomic-embed-text"
  
  # 相似度阈值
  similarity_threshold: 0.95

  # 时间策略
  ttl: 604800  # 缓存过期时间（秒），默认一周604800
  
  # 大小策略
  max_total_size_mb: 1024  # 总大小限制（1GB）
  max_db_size_mb: 768  # SQLite数据库最大768MB
  max_faiss_size_mb: 392  # FAISS索引最大392MB
  
  # 记录数量策略
  max_records: 100000  # 最多10000条记录
  
  # 清理策略
  cleanup_interval: 3600  # 清理间隔（秒），默认1小时
  cleanup_on_startup: true  # 启动时清理过期缓存


# 接口盒子API配置，官网https://www.apihz.cn/
interfacebox:
  api:
    user_id: ""  # 接口盒子用户ID（可通过环境变量INTERFACEBOX_API_USER_ID覆盖）
    api_key: ""  # 接口盒子API密钥（可通过环境变量INTERFACEBOX_API_KEY覆盖）  

# 行为树自动修复配置
behavior_tree:
  auto_repair:
    enabled: false  # 自动修复开关
    max_repair_attempts: 2  # 最大修复尝试次数
    repair_timeout: 30  # 修复超时时间（秒）

# 执行智能配置
execution_intelligence:
  # 工具执行模式配置
  tool_intelligent_mode:
    file_operations: "direct"      # 直接执行
    email_processor: "confirm"    # 需要确认
    weather_query: "infer"        # 自动推断
    system_command: "direct"     # 需要确认
    text_processing: "direct"     # 直接执行
    network_request: "direct"     # 直接执行
    system_info: "direct"         # 直接执行
    pdf_processor: "direct"       # 直接执行
    document_converter: "direct"  # 直接执行
  
  # ToolLLMClient 配置
  tool_llm:
    base_url: "http://localhost:11434"  # ToolLLMClient 专用地址
  
  # 成本控制配置
  cost_control:
    enabled: true
    model: "qwen3:4b" #"gemma3:1b"           # 工具专用模型
    temperature: 0.3              # 低温度，更确定性
    max_tokens: 200               # 限制生成长度
    timeout_ms: 5000              # 超时时间（毫秒）
  
  # 参数修正最大尝试次数
  inference:
    max_attempts: 2               # 参数验证失败时的最大修正尝试次数
